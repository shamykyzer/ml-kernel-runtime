<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <rect width="900" height="460" rx="12" fill="#0F172A"/>
  <text x="450" y="35" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="700">GEMM Kernel Performance (N=1024)</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748B" font-size="11">GFLOPS, higher is faster. Best block size, best thread count for parallel kernels.</text>

  <!-- Scale: 0-440 GFLOPS, chart x=185..820 (635px), 1.443px per GFLOP -->

  <!-- Naive: 0.38 GFLOPS -->
  <text x="175" y="94" text-anchor="end" fill="#CBD5E1" font-size="12">Naive</text>
  <rect x="185" y="80" width="1" height="22" rx="3" fill="#EF4444"/>
  <text x="194" y="95" fill="#94A3B8" font-size="10">0.38</text>

  <!-- Tiled: 3.30 GFLOPS -->
  <text x="175" y="134" text-anchor="end" fill="#CBD5E1" font-size="12">Tiled</text>
  <rect x="185" y="120" width="5" height="22" rx="3" fill="#F97316"/>
  <text x="198" y="135" fill="#94A3B8" font-size="10">3.30</text>

  <!-- std::simd: 25.11 GFLOPS -->
  <text x="175" y="174" text-anchor="end" fill="#CBD5E1" font-size="12">std::simd</text>
  <rect x="185" y="160" width="36" height="22" rx="3" fill="#06B6D4"/>
  <text x="228" y="175" fill="#94A3B8" font-size="10">25.11</text>

  <!-- Parallel (14t): 17.93 GFLOPS -->
  <text x="175" y="214" text-anchor="end" fill="#CBD5E1" font-size="12">Parallel (14t)</text>
  <rect x="185" y="200" width="26" height="22" rx="3" fill="#22C55E"/>
  <text x="219" y="215" fill="#94A3B8" font-size="10">17.93</text>

  <!-- AVX2+FMA: 41.49 GFLOPS -->
  <text x="175" y="254" text-anchor="end" fill="#CBD5E1" font-size="12">AVX2+FMA</text>
  <rect x="185" y="240" width="60" height="22" rx="3" fill="#3B82F6"/>
  <text x="252" y="255" fill="#94A3B8" font-size="10">41.49</text>

  <!-- AVX-512: 75.98 GFLOPS -->
  <text x="175" y="294" text-anchor="end" fill="#CBD5E1" font-size="12">AVX-512</text>
  <rect x="185" y="280" width="110" height="22" rx="3" fill="#1D4ED8"/>
  <text x="302" y="295" fill="#94A3B8" font-size="10">75.98</text>

  <!-- Parallel+SIMD (18t): 240.83 GFLOPS -->
  <text x="175" y="334" text-anchor="end" fill="#CBD5E1" font-size="12">Parallel+SIMD (18t)</text>
  <rect x="185" y="320" width="348" height="22" rx="3" fill="#8B5CF6"/>
  <text x="540" y="335" fill="#C4B5FD" font-size="10">240.83</text>

  <!-- Parallel+AVX-512 (18t): 415.56 GFLOPS -->
  <text x="175" y="374" text-anchor="end" fill="#CBD5E1" font-size="12">Parallel+AVX512 (18t)</text>
  <rect x="185" y="360" width="600" height="22" rx="3" fill="#E11D48"/>
  <text x="792" y="375" fill="#FFF1F2" font-size="10" font-weight="600">415.56</text>

  <!-- X axis -->
  <line x1="185" y1="396" x2="820" y2="396" stroke="#334155" stroke-width="1"/>
  <text x="185" y="414" fill="#64748B" font-size="10" text-anchor="middle">0</text>
  <text x="344" y="414" fill="#64748B" font-size="10" text-anchor="middle">110</text>
  <text x="502" y="414" fill="#64748B" font-size="10" text-anchor="middle">220</text>
  <text x="661" y="414" fill="#64748B" font-size="10" text-anchor="middle">330</text>
  <text x="820" y="414" fill="#64748B" font-size="10" text-anchor="middle">440</text>
  <line x1="185" y1="393" x2="185" y2="399" stroke="#334155" stroke-width="1"/>
  <line x1="344" y1="393" x2="344" y2="399" stroke="#334155" stroke-width="1"/>
  <line x1="502" y1="393" x2="502" y2="399" stroke="#334155" stroke-width="1"/>
  <line x1="661" y1="393" x2="661" y2="399" stroke="#334155" stroke-width="1"/>
  <line x1="820" y1="393" x2="820" y2="399" stroke="#334155" stroke-width="1"/>
  <text x="502" y="440" text-anchor="middle" fill="#94A3B8" font-size="11">GFLOPS (higher is faster)</text>

  <!-- Speedup annotation on best bar -->
  <rect x="670" y="354" width="76" height="18" rx="4" fill="#1E293B" stroke="#E11D48" stroke-width="1"/>
  <text x="708" y="367" text-anchor="middle" fill="#FFF1F2" font-size="10" font-weight="600">1100x</text>
</svg>
